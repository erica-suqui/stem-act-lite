services:
  postgres:
    image: postgres:16
    container_name: stemact_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stemact
      POSTGRES_USER: stemact_user
      POSTGRES_PASSWORD: stemact_pass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # optional: auto-run schema on first init only
      # - ./schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro

volumes:
  pgdata:
